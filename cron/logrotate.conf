# Rotate cta-bot cron logs so they don't grow unbounded.
# Install with: sudo scripts/install-logrotate.sh
#
# copytruncate is intentional — bin/cron-run.sh appends with `>>` and never
# reopens the file, so a plain rename-and-create rotation would orphan its
# write handle until the next invocation. copytruncate preserves the inode.

/home/cailin/Development/cta-bot/cron/*.log {
    su cailin cailin
    daily
    rotate 14
    size 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    nocreate
}
